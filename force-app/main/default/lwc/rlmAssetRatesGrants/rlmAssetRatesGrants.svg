  <!-- Bar chart / grant bars -->
  <rect x="14" y="44" width="8" height="6" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="26" y="41" width="8" height="9" rx="1" fill="#FFFFFF" opacity="0.85"/>
