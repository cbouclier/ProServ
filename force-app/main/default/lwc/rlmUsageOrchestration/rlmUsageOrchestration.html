<template>
    <lightning-card title="Usage Orchestration" icon-name="standard:flow">
        <div class="slds-p-around_medium">

            <!-- Action Buttons -->
            <div class="slds-grid slds-gutters_small slds-grid_vertical-align-center slds-m-bottom_medium">
                <div class="slds-col slds-grow-none">
                    <lightning-button
                        variant="brand"
                        label={processButtonLabel}
                        onclick={handleProcessUsage}
                        disabled={isStartDisabled}
                        icon-name="utility:refresh">
                    </lightning-button>
                </div>
                <div class="slds-col slds-text-align_right">
                    <lightning-button
                        variant="neutral"
                        label="Monitor Workflow Services"
                        onclick={handleMonitorWorkflow}
                        icon-name="utility:open">
                    </lightning-button>
                </div>
            </div>

            <!-- Static Processing Steps -->
            <div class="slds-m-top_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Processing Steps</h3>
                <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium">
                    Processing typically takes around 15 minutes. Use Monitor Workflow Services for live status.
                </p>

                <div class="step-card step-pending slds-box slds-p-around_small slds-m-bottom_small">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col slds-size_1-of-12">
                            <lightning-icon icon-name="utility:clock" size="small" variant="inverse"></lightning-icon>
                        </div>
                        <div class="slds-col slds-size_11-of-12">
                            <p class="slds-text-heading_small">1. Generate Usage Summary</p>
                            <p class="slds-text-body_small slds-text-color_weak">
                                Aggregates transaction journals into usage summaries
                            </p>
                        </div>
                    </div>
                </div>

                <div class="step-card step-pending slds-box slds-p-around_small slds-m-bottom_small">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col slds-size_1-of-12">
                            <lightning-icon icon-name="utility:clock" size="small" variant="inverse"></lightning-icon>
                        </div>
                        <div class="slds-col slds-size_11-of-12">
                            <p class="slds-text-heading_small">2. Generate Usage Ratable Summary</p>
                            <p class="slds-text-body_small slds-text-color_weak">
                                Calculates rates and applies pricing to usage summaries
                            </p>
                        </div>
                    </div>
                </div>

                <div class="step-card step-pending slds-box slds-p-around_small">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col slds-size_1-of-12">
                            <lightning-icon icon-name="utility:clock" size="small" variant="inverse"></lightning-icon>
                        </div>
                        <div class="slds-col slds-size_11-of-12">
                            <p class="slds-text-heading_small">3. Generate Liable Summary</p>
                            <p class="slds-text-body_small slds-text-color_weak">
                                Creates billing-ready liable summaries from rated usage
                            </p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </lightning-card>
</template>
